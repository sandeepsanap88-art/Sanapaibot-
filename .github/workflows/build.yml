name: Build Sanap AI APK
on:
  push:
    branches: [ main ]
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: unzip sanap_ai_flutter.zip

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - run: cd sanap_ai && flutter pub get

      - run: cd sanap_ai && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: Sanap-AI-APK
          path: sanap_ai/build/app/outputs/flutter-apk/app-release.apk
